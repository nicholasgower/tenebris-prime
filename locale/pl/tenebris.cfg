[item-description]
luciferin=Bioluminescencyjny proszek emitujący delikatną niebiesko-zieloną poświatę, wykorzystywany w zaawansowanych zastosowaniach związanych z energią i światłem.
lucifunnel=Roślina bioluminescencyjna o delikatnych, lejkowatych liściach, które emitują eteryczną niebiesko-zieloną poświatę. Jej zwijające się wąsy i misterne wzory na liściach tworzą w ciemności hipnotyzujący widok, przypominający podwodne korale lub obcą roślinność. Lucifunnel rozwija się w środowiskach o słabym oświetleniu, gdzie promieniuje delikatnym, upiornym światłem, przyciągając nocnych zapylaczy i rozświetlając otoczenie mistyczną aurą.
lucifunnel-seed=Rzadkie, świecące nasiono emitujące delikatną niebiesko-zieloną poświatę, niezbędne do uprawy flory bioluminescencyjnej.
quartz-ore=Błyszczący, kryształopodobny minerał występujący w surowych, ziemistych złożach, ceniony w rzemiośle i przemyśle.
quartz-crystal=Przezroczysty, szklisty minerał o ostrych fasetach, ceniony za swoje piękno i trwałość w rzemiośle i przemyśle.
chitin=Wytrzymały, warstwowy materiał pochodzący z egzoszkieletów, znany ze swojej sprężystości i trwałości.
tenecap=Matowy brązowy grzyb.
tenecap-spore=Mała wiązka zarodników, zebrana z grzyba Tenecap.
chitosan=Rafinowany, lekki materiał pochodzący z chityny, znany ze swojej elastyczności i trwałości.
biobeacon=Nadajnik nasycony mocą bioluminescencyjną, akceptuje wszystkie moduły, które może przyjąć standardowy nadajnik, oprócz [item=productivity-module].

