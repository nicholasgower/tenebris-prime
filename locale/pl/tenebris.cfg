[mod-name]
tenebris-prime=○🌐Tenebris Prime

[mod-description]
tenebris-prime=○🌐Dodaje nową planetę, Tenebris – mroczną planetę spowitą gęstą, kwaśną atmosferą. Jest to rozwidlenie oryginalnego modu Tenebris.

[space-location-name]
tenebris=Tenebris

[space-location-description]
tenebris=Tajemnicza, mroczna planeta, wiecznie spowita cieniem z powodu gęstej atmosfery pochłaniającej światło. Powierzchnia jest słabo oświetlona przez bioluminescencyjną florę i faunę, która rozwija się w warunkach braku światła słonecznego, rzucając słaby blask na krajobraz zabarwiony na fioletowo i ciemnoniebiesko. Tenebris to surowy, enigmatyczny świat, w którym technologia i światło są niezbędne do przetrwania w nieustannym mroku.

