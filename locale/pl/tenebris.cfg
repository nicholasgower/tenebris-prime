[tips-and-tricks-item-name]
tenebris-briefing=Odprawa dotycząca Tenebris

[tips-and-tricks-item-description]
tenebris-briefing=[planet=tenebris] to planeta spowita wieczną ciemnością; światło słoneczne jest tu bezużyteczne, a noktowizor również nie zadziała. Planeta jest pełna stonóg, które są silne i jadowite, ale nie będą ci przeszkadzać, dopóki nie wejdziesz im w drogę. Planeta jest zasilana przez [item=luciferin], związek, który pozwala na tworzenie maszyn bioluminescencyjnych, które nie potrzebują żadnego zasilania do działania. Kapsuły transportowe mogą doświadczać awarii nawigacyjnych podczas próby lądowania na tej planecie, może uda nam się wykorzystać technologię, którą tu badamy, aby to obejść?\n\nBędziesz musiał użyć [entity=bioinfusor], aby nadać maszynom właściwości bioluminescencyjne, co pozwoli im funkcjonować bez potrzeby zasilania.

