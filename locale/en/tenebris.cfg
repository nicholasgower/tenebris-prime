[item-description]
bioluminescent-science-pack=Science pack infused with bioluminescent compounds from Tenebris.
piezoelectric-science-pack=Science pack utilizing piezoelectric crystal technology.
luciferin=A bioluminescent powder that emits a soft blue-green glow. Naturally explosive.
lucifunnel=A bioluminescent plant with delicate, funnel-shaped leaves that emit an ethereal blue-green glow.
lucifunnel-seed=A rare, luminous seed emitting a soft blue-green glow, essential for cultivating bioluminescent flora.
tenecap=A dull brown mushroom that thrives in the dark atmosphere of Tenebris. Its prolific spore production has slowly choked the planet's atmosphere and acidified its surface and its surrounding space.
tenecap-spore=Microscopic spores harvested from the Tenecap mushroom. These airborne particles saturate the atmosphere of Tenebris, driving its acidic conditions.
mercurial-stromatolite=Primitive layered structures formed by mercurial microorganisms in Tenebris' mercurial pools.
mercurial-archaea=Primitive microorganisms that thrive in mercury-rich environments.
overgrowth-luciferin-soil=Enriched soil infused with luciferin, allowing Lucifunnels to grow.
overgrowth-tenecap-soil=Enriched soil infused with spores, allowing Tenecaps to grow.
piezoelectric-converter=Converts mechanical stress into electrical energy using piezoelectric crystals.
piezoelectric-motor=An efficient motor powered by piezoelectric energy conversion.
piezoelectric-inserter=A slow but energy-efficient inserter, powered by piezoelectric crystals. Requires no electricity. [font=default-semibold]Reach is adjustable[/font] between normal (1 tile) and long-handed (2 tiles).
piezoelectric-lamp=A lamp powered by piezoelectric energy, providing bright illumination without electrical connection.
piezoelectric-converter-capture-bot-rocket=A rocket-propelled capture bot that uses piezoelectric energy to safely convert quartz ortets into power factories.
observation-satellite=A satellite designed to scan deep space for undiscovered space locations.
bismuth-asteroid-chunk=A chunk of bismuth-rich asteroid material, harvested from the Iridescent River.
infected-carbonic-chunk=A carbonic asteroid fragment colonized by centipede larvae. Will hatch into a premature centipede if left unprocessed. Can be crushed into lucifunnel and carbon.
tenebris-biopipe=A flexible organic pipe made from chitin, ideal for transporting fluids on Tenebris.
tenebris-biopipe-to-ground=An underground variant of the biopipe with extended 12-tile range.
tenebris-heated-pumpjack=A pumpjack modified to operate using heat instead of electricity. Requires connection to heat pipes.
tenebris-heated-big-mining-drill=A heat-powered mining drill for remote lichen deposits. Faster than standard, but has a smaller mining radius and reduced resource preservation due to high heat. Higher quality versions gain larger mining area, more module slots, and reduced resource drain.
tenebris-heated-agricultural-tower=An agricultural tower powered by heat energy for growing crops in remote locations. Twice as fast as a standard agricultural tower.
tenebris-heated-atmosphere-scrubber=Scrubs the toxic Tenebris atmosphere using heat power.
tenebris-crystal-resonance-chamber=A specialized machine that uses crystal resonance to sediment, process quartz, and grow crystals.
tenebris-quartz-ortet-robo-interface=A roboport interface that draws power from nearby quartz crystal formations. Only buildable on Tenebris.
tenebris-chitin=A tough, layered material from centipede exoskeletons, known for its resilience and durability. Strange how it's also harvested from tenecaps.
tenebris-chitosan=A refined, lightweight material derived from chitin, known for its flexibility and durability.
tenebris-flare-ammo=A luciferin-based flare that creates a long-lasting luciferin fire for illumination.
tenebris-flare-gun=A specialized launcher for firing luciferin flares to light up distant areas.
tenebris-centipede-corpse=The remains of a space centipede. Can be crushed into radiation-hardened chitin.
tenebris-radiation-hardened-chitin=Chitin plates that have been hardened by cosmic radiation. Can be crushed on a planet surface to extract usable chitin.
tenebris-quartz-ore=Raw quartz ore mined from Tenebris deposits.
tenebris-quartz-geode=A hollow rock formation containing quartz crystals inside.
tenebris-bismuth-ore=Iridescent bismuth ore with unique crystalline properties.
tenebris-cinnabar=A mercury-rich mineral with a distinctive red coloration.
tenebris-onyx=A dark, opaque variety of quartz with deep black coloring. Naturally emits phosphors.
tenebris-citrine=A yellow-orange quartz crystal with piezoelectric properties. Naturally emits phosphors.
tenebris-prasiolite=A green variety of quartz, also known as green amethyst. Naturally emits fluorescents.
tenebris-amethyst=A purple quartz crystal prized for its piezoelectric properties. Naturally emits fluorescents.
tenebris-ruby-agate=A banded quartz with deep red coloration. Naturally emits phosphors.
tenebris-sapphire-agate=A banded quartz with brilliant blue coloration. Naturally emits fluorescents.
tenebris-crystal-seedling=A small crystal fragment that can be grown into larger crystals.
tenebris-crystal-oscillator=A precisely tuned crystal that oscillates at specific frequencies.
tenebris-ceramic-plate=Heat-resistant ceramic plate made from processed Tenebris materials. Made to withstand the acidity and heat.
tenebris-ceramic-circuitry=Advanced circuitry using ceramic substrates for high-temperature operation.
tenebris-ceramic-filter=A high-temperature filter made from ceramic materials for atmosphere scrubbing.
tenebris-used-ceramic-filter=A ceramic filter saturated with atmospheric contaminants. Can be cleaned to renew.
tenebris-carbon-spore-filter=A filter made from carbon and spore materials for basic atmosphere scrubbing.
tenebris-used-carbon-spore-filter=A carbon filter saturated with atmospheric contaminants. Can be cleaned to renew.
tenebris-ceramic-robot-frame=A acid-resistant robot frame made from ceramic materials. Combined with piezoelectric properties, it can move and function for extended times naturally albeit not as quickly as their steel counterparts.
tenebris-ceramic-construction-robot=A construction robot built with ceramic components for corrosive environments.
tenebris-ceramic-logistic-robot=A logistic robot built with ceramic components for corrosive environments.
tenebris-ceramic-plated-heat-pipe=A heat pipe with ceramic plating for improved heat transfer.
tenebris-mercurial-vat=A crystalline vat formed from mercurial compounds, placed in a dish for processing.
tenebris-mercury-vii-plate=An exotic plate made from smelting mercury at extreme temperatures. 
tenebris-cupric-mercury-amalgam=An amalgam of copper and mercury with unique electrical properties.
tenebris-ferric-waste=Waste iron compounds from processing. Can be melted down into its molten form to be reused.
tenebris-cupric-waste=Waste copper compounds from processing. Can be melted down into its molten form to be reused.
tenebris-circuit-waste=Discarded circuit components. Can be recycled into ferric and cupric scrap, and biopolymers.
tenebris-thermal-battery=A high-capacity heat storage unit that can buffer 100x more thermal energy than a regular heat pipe.
tenebris-thermal-diode=A one-way heat valve that only allows heat to flow when the input temperature exceeds a threshold.
tenebris-ceramic-thermal-diode=A high-performance one-way heat valve with ceramic heat pipes for faster heat transfer.
tenebris-biobeacon=Beacon infused with bioluminescent power, accepts productivity modules in addition to standard modules.
tenebris-bioinfusor=Infuses machinery with bioluminescent properties, allowing them to function without power.
tenebris-lightning-furnace=An ultra-fast furnace powered by lightning strikes. Uses collected lightning energy for 20x crafting speed. Unpowered outside of direct strikes.

