[mod-name]
tenebris-prime=○🌐Tenebris Prime

[mod-description]
tenebris-prime=○🌐Adds a new planet, Tenebris, a dark planet enshrouded in a thick acidic atmosphere. Fork of the original Tenebris mod.

[space-location-name]
tenebris=Tenebris
iridescent-river=Iridescent River
the-nest=The Nest
lightless-gateway=Lightless Gateway
lightless-abyss=Lightless Abyss

[space-location-description]
tenebris=A dark, rogue planet, perpetually cloaked in shadow due to its thick, light-absorbing atmosphere. The planet emits a cloud of spores that darken the space around it. The surface is sparsely illuminated by biolumiescent flora, but the air is choked with spores, acidifying and corroding everything it touches.
iridescent-river=A shimmering expanse of bismuth-rich asteroids that catch light in rainbow iridescence.
the-nest=The spawning grounds of the leviathan centipedes. The asteroids grow sparse, replaced by the colossal silhouettes of ancient creatures guarding their domain.
lightless-gateway=The threshold beyond which no light penetrates. A point of no return for the unprepared.
lightless-abyss=The void between stars.

[surface-property-name]
innate-energy-luminosity=Innate Energy Luminosity

[surface-property-description]
innate-energy-luminosity=The presence of piezoelectric quartz crystal formations that resonate with captured energy. Found only on Tenebris.

[surface-property-unit]
innate-energy-luminosity=__1__%

