[mod-setting-description]
tenebris-maraxsis-beacon-integration=If Maraxsis is installed, the Conduit recipe will be modified to require the biobeacon.
tenebris-allow-quality-modules-in-biobeacon=When enabled, quality modules can be inserted into the bioluminescent beacon.
tenebris-use-new-biobeacon-recipe=When enabled, uses the updated biobeacon recipe.
tenebris-premature-centipede-length=Reduce this value if you are experiencing performance issues. Premature centipedes hatch from infected carbonic chunks.
tenebris-small-centipede-length=Reduce this value if you are experiencing performance issues.
tenebris-medium-centipede-length=Reduce this value if you are experiencing performance issues.
tenebris-large-centipede-length=Reduce this value if you are experiencing performance issues.
tenebris-giant-centipede-length=Reduce this value if you are experiencing performance issues.
tenebris-leviathan-centipede-length=Reduce this value if you are experiencing performance issues.
tenebris-spore-damage-entities-per-chunk=Maximum number of entities randomly damaged by spores per chunk per check on Tenebris surface. Lower values improve performance.
tenebris-spore-damage-interval-seconds=How often (in seconds) to check for spore damage. Applies to both Tenebris surface and tenespace travel. Higher values improve performance but make damage less frequent. Requires game restart.
tenebris-spore-damage-percent=Percentage of max health dealt as acid damage per check when entities are not protected by pollution on Tenebris surface. Values: 1%, 2%, 5%, 10%, 15%, 20%, 25%.
tenebris-tenespace-corrosion-entities-per-chunk=Maximum number of entities randomly damaged by tenecap spore corrosion per chunk per check on space platforms traveling through tenespace. Lower default than surface since repairs are harder in space.
tenebris-tenespace-particle-baseline-chunks=The platform size (in chunks) at which particle effects spawn at 1x rate. Larger platforms spawn more particles, smaller platforms spawn fewer. Increase this value to reduce overall particle density.

