[fluid-description]
tenebris-atmosphere=The thick, toxic atmosphere of Tenebris. Rich in sulfuric compounds and spores.
tenebris-sulfinated-spore-waste=Waste fluid from atmospheric processing. Contains sulfur compounds and tenecap spores.
tenebris-mercury=Liquid mercury extracted from Tenebris' mercurial lakes.
tenebris-hydrofluoric-acid=Extremely corrosive acid used for etching quartz and processing crystals.
tenebris-quartz-slurry=A suspension of finely ground quartz particles.
tenebris-molten-bismuth=Molten bismuth metal, used for advanced ceramic plate production.
tenebris-piezoelectric-heat=Heat transfer medium for piezoelectric power systems.

