[tips-and-tricks-item-description]
deep-space-sensing-tip=Launch [item=observation-satellite]s into orbit to scan the sectors of space for hidden deep space objects. The more [item=observation-satellite]s in orbit, the higher the chance of discovering new destinations. Be strategic about which planets you choose to launch your satellites from as distance to such objects plays a key factor in the time it will take. You can use the Space Map to infer the distance between locations. Who knows what you will discover...
tenebris-briefing=[planet=tenebris] is a world of eternal darkness. Solar panels are useless here, and even night vision fails to pierce the gloom.\n\nPower comes from [font=default-semibold]piezoelectric quartz crystals[/font]. Capture wild quartz ortets and buds from the crystal forests to create generators that convert heat into electricity, distributed over an isolated area without wires.\n\nThe surface features toxic [item=tenecap-spore] spores that damage exposed machinery, pools of liquid mercury where stromatolites grow, and vast lichen deposits rich in organic matter.\n\n[color=red]Warning:[/color] Many basic entities [color=red]explode immediately[/color] when placed on this planet. Check the banned entities guide for details. The corrosive atmosphere also destroys basic materials in cargo pods.
tenebris-banned-entities=The corrosive atmosphere and unique conditions of [planet=tenebris] cause certain entities to [color=red]explode immediately[/color] when placed.\n\n[font=default-semibold][color=red]Explodes on Placement:[/color][/font]\n\n[font=default-semibold]Electric Poles (all types):[/font]\n• Small electric pole, medium electric pole, big electric pole, substation\n• Use piezoelectric generators for power instead\n\n[font=default-semibold]Basic Pipes:[/font]\n• [entity=pipe] Pipe, [entity=pipe-to-ground] Pipe to ground\n• Use biopipes instead\n\n[font=default-semibold]Lower-Tier Belts:[/font]\n• [entity=transport-belt] Transport belt, [entity=fast-transport-belt] Fast transport belt\n• [entity=underground-belt] Underground belt, [entity=fast-underground-belt] Fast underground belt\n• [entity=splitter] Splitter, [entity=fast-splitter] Fast splitter\n• Express tier and above are allowed\n\n[font=default-semibold]Basic Inserters:[/font]\n• [entity=inserter] Inserter, [entity=burner-inserter] Burner inserter\n• Long-handed, fast, bulk, and stack inserters are allowed\n\n[font=default-semibold]Other:[/font]\n• [entity=assembling-machine-1] Assembling machine 1 (tier 2+ allowed)\n• [entity=iron-chest] Iron chest (steel chest allowed)\n• [entity=steam-engine] Steam engine
tenebris-spore-clearance=The atmosphere of [planet=tenebris] is thick with toxic [item=tenecap-spore] spores. Most machinery cannot operate until the air is cleared.\n\n[font=default-semibold]How Spore Clearance Works:[/font]\n• Build [item=tenebris-heated-atmosphere-scrubber] Heated Atmosphere Scrubbers to clear spores from the air\n• Scrubbers use heat energy and filters to absorb spores in their area\n• Non-heated machines [color=red]will not function[/color] until sufficient spore clearance is present\n\n[font=default-semibold]Strategy:[/font]\n1. Set up heat infrastructure (import heat pipes, reactors)\n2. Build atmosphere scrubbers to clear your work area\n3. Then place assemblers, inserters, and other machinery\n\n[font=default-semibold]Immune to Spores:[/font]\n• Heat-based machines (always work)\n• Piezoelectric generators (provide isolated power)\n• Chests, belts, and basic logistics
tenebris-cargo-safety=The atmosphere of [planet=tenebris] is highly corrosive to basic materials during cargo pod descent.\n\n[font=default-semibold][color=red]DANGER - Causes Explosion:[/color][/font]\n• [item=battery] Batteries\n• [item=scrap] Scrap\nThese items react violently with the atmosphere and will [color=red]destroy the entire cargo pod[/color] along with all contents!\n\n[font=default-semibold][color=orange]Corrodes to Waste:[/color][/font]\n• Iron/steel plates, gears, sticks, pipes\n• Copper plates, cables\n• Electronic circuits, advanced circuits, processing units\n\n[font=default-semibold][color=yellow]Converts to Stone:[/color][/font]\n• Iron ore, copper ore\n• Metallic asteroid chunks\n\n[font=default-semibold][color=green]Safe to Ship:[/color][/font]\n• Finished machines and equipment\n• Modules, science packs, ammunition\n• Stone, concrete, refined materials
tenebris-ortet-capture=Use [item=piezoelectric-converter-capture-bot-rocket] Capture Bot Rockets to capture [entity=tenebris-quartz-forest-ortet] quartz ortets and their buds. Shoot the quartz ortet or bud to convert it into a [font=default-semibold]piezoelectric generator[/font]\n\n[font=default-semibold]Generator Tiers:[/font]\nThe generator's power output depends on the [color=cyan]maturity[/color] of the captured crystal:\n• [color=gray]Immature[/color] buds produce less power\n• [color=green]Mature[/color] ortets produce more power\n• Each tier has a larger isolated power supply radius\n\nGenerators convert [font=default-semibold]heat into electricity[/font] and distribute it within their area.

